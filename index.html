<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Parking Booking System</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { background-color: #3498db; color: white; border: none; padding: 10px 20px; font-size: 16px; border-radius: 6px; cursor: pointer; width: 100%; margin-top: 10px; }
        button:hover { background-color: #2980b9; }
        button.secondary { background-color: #95a5a6; }
        button.success { background-color: #2ecc71; margin-top: 20px; font-weight: bold; }
        .hidden { display: none; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 20px; }
        .slot-grid { display: flex; gap: 10px; margin-bottom: 20px; }
        .slot { flex: 1; padding: 20px; text-align: center; border-radius: 8px; font-weight: bold; color: white; }
        .available { background-color: #2ecc71; }
        .occupied { background-color: #e74c3c; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
    </style>
</head>
<body>

<div class="container">
    
    <!-- LOGIN/SIGNUP SECTION -->
    <div id="auth-section">
        <h2 id="auth-title">Login</h2>
        <div class="form-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="Enter username">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter password">
        </div>
        <button id="main-auth-btn" onclick="handleAuth()">Login</button>
        <button class="secondary" id="toggle-auth-btn" onclick="toggleAuthMode()">Don't have an account? Sign Up</button>
        <div id="auth-error" style="color: red; text-align: center; margin-top: 10px; display: none;"></div>
    </div>

    <!-- USER DASHBOARD -->
    <div id="user-dashboard" class="hidden">
        <div class="header">
            <h3>Welcome, <span id="user-name-display"></span></h3>
            <button onclick="logout()" style="width: auto;">Logout</button>
        </div>

        <h4>Gate Access</h4>
        <button class="success" onclick="tryOpenGate()">CHECK-IN & OPEN GATE</button>
        <p style="font-size: 12px; color: #666;">Gate only opens if you have a booking for right now.</p>

        <hr>
        <h4>Real-Time Slot Availability</h4>
        <div class="slot-grid" id="slots-display"></div>

        <h4>Book a Parking Space</h4>
        <div class="form-group">
            <label>Select Slot</label>
            <select id="book-slot">
                <option value="slot_1">Slot 1</option>
                <option value="slot_2">Slot 2</option>
                <option value="slot_3">Slot 3</option>
            </select>
        </div>
        <div class="form-group"><label>Date</label><input type="date" id="book-date"></div>
        <div class="form-group"><label>Entry Time</label><input type="time" id="book-entry"></div>
        <div class="form-group"><label>Exit Time</label><input type="time" id="book-exit"></div>
        <button onclick="createBooking()">Confirm Booking</button>
    </div>

    <!-- ADMIN DASHBOARD -->
    <div id="admin-dashboard" class="hidden">
        <div class="header"><h3>Admin Dashboard</h3><button onclick="logout()" style="width: auto;">Logout</button></div>
        <table>
            <thead><tr><th>User</th><th>Slot</th><th>Date</th><th>Entry</th><th>Exit</th><th>Actions</th></tr></thead>
            <tbody id="admin-table-body"></tbody>
        </table>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCTr-Xh32ehSrZ0yGKYEXN6_6nVMZvPF40",
        authDomain: "smart-parking-system-5f779.firebaseapp.com",
        databaseURL: "https://smart-parking-system-5f779-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "smart-parking-system-5f779",
        storageBucket: "smart-parking-system-5f779.firebasestorage.app",
        messagingSenderId: "1063980683607",
        appId: "1:1063980683607:web:64fe282ebb7c0ceb9d2e12"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    let isLoginMode = true;
    let currentUserData = null;

    function toggleAuthMode() {
        isLoginMode = !isLoginMode;
        document.getElementById('auth-title').innerText = isLoginMode ? "Login" : "Sign Up";
        document.getElementById('main-auth-btn').innerText = isLoginMode ? "Login" : "Register";
        document.getElementById('toggle-auth-btn').innerText = isLoginMode ? "Don't have an account? Sign Up" : "Back to Login";
    }

    async function handleAuth() {
        const user = document.getElementById('username').value.trim();
        const pass = document.getElementById('password').value.trim();
        const errorDiv = document.getElementById('auth-error');
        errorDiv.style.display = "none";

        if (!user || !pass) {
            errorDiv.innerText = "Username and Password required.";
            errorDiv.style.display = "block";
            return;
        }

        if (isLoginMode) {
            // LOGIN LOGIC
            db.ref('registered_users/' + user).once('value', (snap) => {
                if (snap.exists() && snap.val().password === pass) {
                    executeFirebaseLogin(user, snap.val().role);
                } else {
                    errorDiv.innerText = "User does not exist or wrong password.";
                    errorDiv.style.display = "block";
                }
            });
        } else {
            // SIGN UP LOGIC
            db.ref('registered_users/' + user).once('value', (snap) => {
                if (snap.exists()) {
                    errorDiv.innerText = "Username already taken.";
                    errorDiv.style.display = "block";
                } else {
                    db.ref('registered_users/' + user).set({
                        password: pass,
                        role: 'user'
                    }).then(() => {
                        alert("Account created! Please login.");
                        toggleAuthMode();
                    });
                }
            });
        }
    }

    function executeFirebaseLogin(username, role) {
        auth.signInAnonymously().then((cred) => {
            currentUserData = { uid: cred.user.uid, username: username, role: role };
            document.getElementById('user-name-display').innerText = username;
            showDashboard();
        });
    }

    function showDashboard() {
        document.getElementById('auth-section').classList.add('hidden');
        if (currentUserData.role === 'admin') {
            document.getElementById('admin-dashboard').classList.remove('hidden');
            loadAdminData();
        } else {
            document.getElementById('user-dashboard').classList.remove('hidden');
            loadUserSlots();
        }
    }

    // GATE LOGIC: Only open if User has a valid booking NOW
    function tryOpenGate() {
        const now = new Date();
        db.ref('bookings').orderByChild('username').equalTo(currentUserData.username).once('value', (snap) => {
            let canEnter = false;
            snap.forEach(child => {
                const b = child.val();
                const entry = new Date(b.entry_time);
                const exit = new Date(b.exit_time);
                
                // Check if current time is between entry and exit
                if (now >= entry && now <= exit) {
                    canEnter = true;
                }
            });

            if (canEnter) {
                db.ref('gate_control/command').set('open');
                alert("Access Granted! Opening gate...");
            } else {
                alert("Access Denied: No active booking found for this time.");
            }
        });
    }

    function createBooking() {
        const slot = document.getElementById('book-slot').value;
        const date = document.getElementById('book-date').value;
        const entry = document.getElementById('book-entry').value;
        const exit = document.getElementById('book-exit').value;

        if (!date || !entry || !exit) return alert("Fill all fields");

        db.ref('bookings').push({
            username: currentUserData.username,
            slot: slot,
            date: date,
            entry_time: `${date}T${entry}:00`,
            exit_time: `${date}T${exit}:00`,
            status: "valid"
        }).then(() => alert("Booked!"));
    }

    function loadUserSlots() {
        db.ref('parking_slots').on('value', (snap) => {
            const grid = document.getElementById('slots-display');
            grid.innerHTML = '';
            snap.forEach(child => {
                const status = child.val().status || 'available';
                grid.innerHTML += `<div class="slot ${status}">${child.key.toUpperCase()}</div>`;
            });
        });
    }

    function logout() { location.reload(); }
</script>
</body>
</html>
